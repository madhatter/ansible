---
# Nginx
nginx_sites:
  - name: nostalgix
    server_name: nostalgix.org
    listen: 443
    root: /var/www/blog
    ssl: true
    access_log: /var/log/nginx/nostalgix.access.log
    redirects:
      - from_server_name: www.nostalgix.org
        to_url: https://nostalgix.org$request_uri
      - from_server_name: nostalgix.org
        to_url: https://nostalgix.org$request_uri

  - name: share.nostalgix.org
    server_name: share.nostalgix.org
    listen: 80
    root: /var/www/share
    autoindex: true
    access_log: /var/log/nginx/share.access.log

nginx_ssl:
  enabled: true
  cert_path: /etc/letsencrypt/live/www.nostalgix.org/fullchain.pem
  key_path: /etc/letsencrypt/live/www.nostalgix.org/privkey.pem

# Let's Encrypt configuration
letsencrypt_webroot: /var/www/letsencrypt
certbot_email: "" # fill in your email address
certbot_certs:
  - name: www.nostalgix.org
    domains:
      - nostalgix.org
      - www.nostalgix.org
  - name: share.nostalgix.org
    domains:
      - share.nostalgix.org
  - name: brutal.nostalgix.org
    domains:
      - brutal.nostalgix.org
  - name: mail.nostalgix.org
    domains:
      - mail.nostalgix.org

# Application settings
app_user: deployer
app_root: /home/{{ app_user }}/blog
app_port: 3000

# Mail
mail_hostname: mail.nostalgix.org
mail_domain: nostalgix.org
mail_user: madhatter
mail_dkim_selector: mail

# Network
network_ipv6_address: 2a03:4000:6:7230::1/64
network_ipv6_gateway: fe80::1

# Firewall
firewall_allowed_tcp:
  - 22    # SSH
  - 25    # SMTP
  - 80    # HTTP
  - 443   # HTTPS
  - 587   # submission
  - 995   # POP3S

# GitHub Actions Deployment
github_deploy_key: "ssh-rsa  arvid.warnecke@S0197238"
