---
- name: Install nftables
  pacman:
    name: nftables
    state: present

- name: Deploy nftables config
  template:
    src: nftables.conf.j2
    dest: /etc/nftables.conf
    owner: root
    group: root
    mode: '0640'
  notify: Reload nftables

- name: Ensure nftables is started and enabled
  service:
    name: nftables
    state: started
    enabled: true
