---
- name: Deploy network configuration
  template:
    src: wired.network.j2
    dest: /etc/systemd/network/wired.network
    owner: root
    group: root
    mode: '0644'
  notify: Restart systemd-networkd

- name: Ensure systemd-networkd is enabled and running
  service:
    name: systemd-networkd
    state: started
    enabled: true
