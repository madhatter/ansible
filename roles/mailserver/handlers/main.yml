---
- name: Rebuild aliases
  command: newaliases

- name: Reload postfix
  service:
    name: postfix
    state: reloaded

- name: Restart postfix
  service:
    name: postfix
    state: restarted

- name: Restart dovecot
  service:
    name: dovecot
    state: restarted

- name: Restart opendkim
  service:
    name: opendkim
    state: restarted
  ignore_errors: "{{ ansible_check_mode }}"
